<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Portal | Student Report System</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { --green:#00c896; --green-dim:rgba(0,200,150,0.1); --bg:#070d1a; --surface:#0d1829; --surface2:#152035; --border:#1e3050; --text:#e8f4ff; --muted:#5a7a9a; --red:#ff4d6d; --yellow:#f5c400; --font:'Sora',sans-serif; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,150,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,150,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    header{background:#0a1525;border-bottom:1px solid var(--border);padding:0 2rem;position:relative;z-index:10;}
    .hdr{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:1rem 0;}
    .hdr-left{display:flex;align-items:center;gap:0.8rem;}
    .hdr-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--green),#006644);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
    .hdr-title{font-size:0.95rem;font-weight:700;}
    .hdr-sub{font-size:0.68rem;color:var(--muted);}
    .hdr-right{display:flex;align-items:center;gap:1rem;}
    .badge{background:var(--green-dim);border:1px solid var(--green);border-radius:20px;padding:0.25rem 0.7rem;font-size:0.68rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.06em;}
    .logout{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:var(--font);font-size:0.72rem;padding:0.3rem 0.7rem;cursor:pointer;}
    main{max-width:1100px;margin:0 auto;padding:2rem;position:relative;z-index:1;}
    .section-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
    .controls{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem;display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap;}
    .ctrl-group{display:flex;flex-direction:column;gap:0.4rem;}
    .ctrl-group label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
    select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:0.8rem;padding:0.5rem 0.8rem;outline:none;cursor:pointer;}
    .btn-load{background:var(--green);border:none;border-radius:8px;color:#000;font-family:var(--font);font-size:0.8rem;font-weight:700;padding:0.55rem 1.2rem;cursor:pointer;transition:all 0.2s;}
    .btn-load:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,200,150,0.25);}
    .marks-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .marks-header{background:var(--surface2);padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
    .marks-title{font-size:0.9rem;font-weight:700;}
    .btn-submit{background:linear-gradient(135deg,var(--green),#00a07a);border:none;border-radius:8px;color:#000;font-family:var(--font);font-size:0.8rem;font-weight:700;padding:0.6rem 1.4rem;cursor:pointer;transition:all 0.2s;}
    .btn-submit:hover{transform:translateY(-1px);}
    table{width:100%;border-collapse:collapse;}
    thead th{padding:0.8rem 1.2rem;text-align:left;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);border-bottom:1px solid var(--border);}
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
    tbody tr:hover{background:var(--surface2);}
    tbody tr:last-child{border-bottom:none;}
    tbody td{padding:0.8rem 1.2rem;font-size:0.85rem;}
    .mark-input{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:0.9rem;padding:0.4rem 0.6rem;width:80px;outline:none;text-align:center;transition:border-color 0.2s;}
    .mark-input:focus{border-color:var(--green);}
    .comment-input{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:0.8rem;padding:0.4rem 0.7rem;width:200px;outline:none;transition:border-color 0.2s;}
    .comment-input:focus{border-color:var(--green);}
    .grade-badge{padding:0.2rem 0.6rem;border-radius:20px;font-size:0.72rem;font-weight:700;}
    .gA{background:rgba(0,200,150,0.15);color:#00c896;} .gB{background:rgba(58,134,255,0.15);color:#3a86ff;}
    .gC{background:rgba(245,196,0,0.15);color:#f5c400;} .gD{background:rgba(255,140,0,0.15);color:#ff8c00;}
    .gF{background:rgba(255,77,109,0.15);color:#ff4d6d;}
    .toast{position:fixed;bottom:2rem;right:2rem;background:#00c896;color:#000;padding:0.8rem 1.5rem;border-radius:10px;font-weight:700;font-size:0.85rem;transform:translateY(100px);opacity:0;transition:all 0.3s;z-index:100;}
    .toast.show{transform:translateY(0);opacity:1;}
    .empty{text-align:center;padding:3rem;color:var(--muted);font-size:0.85rem;}
  </style>
</head>
<body>
<header>
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">👨‍🏫</div>
      <div>
        <div class="hdr-title">Teacher Portal</div>
        <div class="hdr-sub">{{ session.name }} · {{ session.subject }} · {{ session['class'] }}</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="badge">{{ session.school_id }}</div>
      <button class="logout" onclick="window.location='/logout'">Sign Out</button>
    </div>
  </div>
</header>
<main>
  <div class="section-label">Enter Student Marks</div>
  <div class="controls">
    <div class="ctrl-group">
      <label>Term</label>
      <select id="term-select">
        <option>Term 1</option>
        <option>Term 2</option>
        <option>Term 3</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Year</label>
      <select id="year-select">
        <option>2026</option>
        <option>2025</option>
      </select>
    </div>
    <button class="btn-load" onclick="loadMarks()">Load Class</button>
  </div>

  <div class="section-label">Class: {{ session['class'] }} · Subject: {{ session.subject }}</div>
  <div class="marks-panel">
    <div class="marks-header">
      <div class="marks-title" id="marks-title">Select term and click Load Class</div>
      <button class="btn-submit" onclick="submitMarks()">💾 Save Marks</button>
    </div>
    <div id="marks-body">
      <div class="empty">📋 Click "Load Class" to see your students</div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
  let studentsData = [];

  function getGrade(mark) {
    if (mark >= 80) return 'A'; if (mark >= 70) return 'B';
    if (mark >= 60) return 'C'; if (mark >= 50) return 'D'; return 'F';
  }

  function updateGrade(input, row) {
    const val = parseInt(input.value);
    const badge = row.querySelector('.grade-badge');
    if (!isNaN(val) && val >= 0 && val <= 100) {
      const g = getGrade(val);
      badge.textContent = g;
      badge.className = 'grade-badge g' + g;
    } else {
      badge.textContent = '—'; badge.className = 'grade-badge';
    }
  }

  async function loadMarks() {
    const term = document.getElementById('term-select').value;
    const year = document.getElementById('year-select').value;
    const res  = await fetch(`/api/class-marks?term=${encodeURIComponent(term)}&year=${year}`);
    studentsData = await res.json();
    document.getElementById('marks-title').textContent = `${term} ${year} — ${studentsData.length} Students`;
    const body = document.getElementById('marks-body');
    if (!studentsData.length) { body.innerHTML = '<div class="empty">No students found.</div>'; return; }
    body.innerHTML = `
      <table>
        <thead><tr>
          <th>#</th><th>Student Name</th><th>Student ID</th>
          <th>Mark (%)</th><th>Grade</th><th>Comment</th>
        </tr></thead>
        <tbody>
          ${studentsData.map((s, i) => {
            const g = s.mark !== '' ? getGrade(s.mark) : '—';
            return `<tr data-id="${s.student_id}">
              <td style="color:var(--muted)">${i+1}</td>
              <td><b>${s.name}</b></td>
              <td style="color:var(--muted);font-size:0.75rem">${s.student_id}</td>
              <td><input class="mark-input" type="number" min="0" max="100" value="${s.mark}" placeholder="0-100" oninput="updateGrade(this,this.closest('tr'))"/></td>
              <td><span class="grade-badge g${g}">${g}</span></td>
              <td><input class="comment-input" type="text" value="${s.comment}" placeholder="Optional comment"/></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  async function submitMarks() {
    const term = document.getElementById('term-select').value;
    const year = parseInt(document.getElementById('year-select').value);
    const rows = document.querySelectorAll('tbody tr');
    const marks = [];
    rows.forEach(row => {
      const mark    = row.querySelector('.mark-input').value;
      const comment = row.querySelector('.comment-input').value;
      if (mark !== '') marks.push({ student_id: row.dataset.id, mark, comment });
    });
    if (!marks.length) { showToast('No marks to save!', true); return; }
    const res = await fetch('/api/submit-marks', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ marks, term, year })
    });
    const data = await res.json();
    showToast(data.status === 'success' ? '✅ Marks saved successfully!' : '❌ Error saving marks', data.status !== 'success');
  }

  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = isError ? '#ff4d6d' : '#00c896';
    t.style.color = '#000';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
